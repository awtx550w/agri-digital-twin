<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农业数字孪生系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; 
            overflow: hidden; 
            background: #1a1a1a; 
        }
        
        #container { position: relative; width: 100vw; height: 100vh; }
        #canvas-container { width: 100%; height: 100%; }
        
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            width: 260px;
            z-index: 100;
        }
        
        #control-panel h2 {
            margin-bottom: 15px;
            color: #1B5E20;
            font-size: 18px;
            text-align: center;
            border-bottom: 2px solid #81C784;
            padding-bottom: 10px;
        }
        
        .section {
            margin-bottom: 15px;
        }
        
        .section-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 6px;
            border: none;
            border-radius: 6px;
            background: #42A5F5;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        button:hover {
            background: #1E88E5;
            transform: translateY(-1px);
        }
        
        button.active {
            background: #66BB6A;
            box-shadow: 0 2px 8px rgba(102, 187, 106, 0.4);
        }
        
        button.secondary {
            background: #78909C;
        }
        
        button.secondary:hover {
            background: #607D8B;
        }
        
        #status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #81C784;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 100;
            border: 1px solid #66BB6A;
            max-width: 90%;
            text-align: center;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            width: 180px;
            z-index: 100;
            font-size: 13px;
        }
        
        #info-panel h3 {
            color: #1B5E20;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        #info-panel .stat {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            padding: 4px 0;
            border-bottom: 1px solid #eee;
        }
        
        #info-panel .stat:last-child {
            border-bottom: none;
        }
        
        #info-panel .value {
            color: #E53935;
            font-weight: bold;
        }
        
        .hint {
            font-size: 11px;
            color: #888;
            line-height: 1.4;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvas-container"></div>
        
        <!-- 控制面板 -->
        <div id="control-panel">
            <h2>🌾 农业数字孪生</h2>
            
            <div class="section">
                <div class="section-title">绘制模式</div>
                <button id="btn-draw-field" onclick="setDrawFieldMode()">📍 绘制田块</button>
                <button id="btn-draw-path" onclick="setDrawPathMode()">🛤️ 规划路径</button>
                <button class="secondary" onclick="generatePath()">⚡ 生成弓字形路径</button>
            </div>
            
            <div class="section">
                <div class="section-title">仿真控制</div>
                <button id="btn-start-sim" onclick="startSim()">▶️ 开始仿真</button>
                <button class="secondary" onclick="clearAllPathsUI()">🗑️ 清除路径</button>
                <button class="secondary" onclick="resetScene()">🔄 重置场景</button>
            </div>
            
            <div class="section">
                <div class="section-title">添加设备</div>
                <button onclick="addTractor()">🚜 拖拉机</button>
                <button onclick="addDrone()">🚁 无人机</button>
            </div>
            
            <div class="hint">
                💡 操作说明：<br>
                • 左键点击：添加顶点<br>
                • 右键/双击：闭合田块<br>
                • 右键拖拽：旋转视角<br>
                • 滚轮：缩放视角<br><br>
                🟢 绿色 = 作业线（沿主轴方向）<br>
                🟠 橙色 = 转弯段（连接作业线）
            </div>
        </div>
        
        <!-- 状态面板 -->
        <div id="info-panel">
            <h3>📊 当前状态</h3>
            <div class="stat">
                <span>田块顶点数</span>
                <span class="value" id="field-count">0</span>
            </div>
            <div class="stat">
                <span>路径点总数</span>
                <span class="value" id="path-count">0</span>
            </div>
            <div class="stat">
                <span>设备数量</span>
                <span class="value" id="device-count">0</span>
            </div>
        </div>
        
        <div id="status">初始化中...</div>
    </div>
    
    <!-- Three.js -->
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    
    <!-- 组件模块 -->
    <script src="data.js"></script>
    <script src="Terrain.js"></script>
    <script src="FieldManager.js"></script>
    <script src="PathManager.js"></script>
    <script src="DeviceManager.js"></script>
    
    <!-- 主程序 -->
    <script src="app.js"></script>
</body>
</html>
